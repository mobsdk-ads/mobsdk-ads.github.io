<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>广告SDK集合</title>
  <base href="https://mobsdk-ads.github.io/" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
      color: #333;
      padding: 20px;
    }

    .auth-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(244, 246, 249, 0.96);
      z-index: 10;
    }

    .auth-card {
      width: min(420px, 100%);
      padding: 28px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.12);
    }

    .auth-card h2 {
      margin: 0 0 10px;
      font-size: 22px;
      color: #222;
    }

    .auth-card p {
      margin: 0 0 16px;
      color: #666;
      font-size: 14px;
      line-height: 1.5;
    }

    .auth-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d7dce3;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
    }

    .auth-input:focus {
      border-color: #007acc;
      box-shadow: 0 0 0 3px rgba(0, 122, 204, 0.12);
    }

    .auth-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .auth-error {
      min-height: 20px;
      margin-top: 10px;
      color: #d93025;
      font-size: 13px;
    }

    .hidden {
      display: none !important;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #222;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      border-radius: 12px;
      overflow: hidden;
    }

    thead {
      background-color: #f8fafc;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    th, td {
      padding: 3px 4px;
      border-bottom: 1px solid #eee;
      text-align: left;
      font-size: 14px;
    }

    th {
      font-weight: 600;
      color: #555;
    }

    tr:hover {
      background-color: #f0f8ff;
    }

    a {
      color: #007acc;
      text-decoration: none;
      word-break: break-all;
      cursor: pointer;
    }

    .copy-btn {
      padding: 6px 14px;
      font-size: 13px;
      background-color: #007acc;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .copy-btn:hover {
      background-color: #005fa3;
    }

    .copied-label {
      color: #22a100;
      font-size: 13px;
      margin-left: 8px;
      visibility: hidden;
    }

    .file-icon {
      margin-right: 6px;
      font-size: 16px;
    }

    tr.folder-row {
      background-color: #e7f3ff;
      font-weight: 600;
    }

    tr.folder-row > td {
      padding: 8px 4px;
      vertical-align: middle;
    }

    tr.child-row:hover {
      background-color: #dbeeff;
    }

    @media (max-width: 768px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        margin-bottom: 12px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        padding: 10px;
      }

      td {
        padding: 8px 12px;
        border: none;
        position: relative;
      }

      td::before {
        content: attr(data-label);
        font-weight: bold;
        display: block;
        color: #888;
        margin-bottom: 4px;
      }
    }
  </style>
</head>
<body>
  <div id="authOverlay" class="auth-overlay">
    <div class="auth-card">
      <h2>访问验证</h2>
      <p>请输入访问密码，验证通过后加载页面内容。</p>
      <input id="passwordInput" class="auth-input" type="password" placeholder="请输入密码" autocomplete="current-password" />
      <div class="auth-actions">
        <button id="unlockButton" class="copy-btn" type="button">解锁</button>
      </div>
      <div id="authError" class="auth-error"></div>
    </div>
  </div>

  <div id="protectedContent" class="hidden">
    <h1>📁 文件浏览器</h1>

    <table>
      <thead>
        <tr>
          <th>文件路径</th>
          <th>大小</th>
          <th>修改时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="fileTableBody"></tbody>
    </table>
  </div>

  <script>
    const AUTH_STORAGE_KEY = 'repo-page-unlocked';
    const EXPECTED_HASH = ['0fa11983', '1b2cce1a', '23484eb7', '42b23e3f', '83e2441a', 'b5618971', '7b00260b', '4b55ba29'].join('');

    async function sha256(text) {
      const buffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buffer))
        .map(byte => byte.toString(16).padStart(2, '0'))
        .join('');
    }

    function showProtectedContent() {
      document.getElementById('authOverlay').classList.add('hidden');
      document.getElementById('protectedContent').classList.remove('hidden');
    }

    async function unlockPage() {
      const passwordInput = document.getElementById('passwordInput');
      const authError = document.getElementById('authError');
      const passwordHash = await sha256(passwordInput.value);

      if (passwordHash !== EXPECTED_HASH) {
        authError.textContent = '密码错误';
        passwordInput.focus();
        passwordInput.select();
        return;
      }

      sessionStorage.setItem(AUTH_STORAGE_KEY, '1');
      authError.textContent = '';
      showProtectedContent();
      fetchOfflineData();
    }

    function initAuth() {
      const passwordInput = document.getElementById('passwordInput');
      const unlockButton = document.getElementById('unlockButton');

      unlockButton.addEventListener('click', unlockPage);
      passwordInput.addEventListener('keydown', event => {
        if (event.key === 'Enter') {
          unlockPage();
        }
      });

      if (sessionStorage.getItem(AUTH_STORAGE_KEY) === '1') {
        showProtectedContent();
        fetchOfflineData();
        return;
      }

      passwordInput.focus();
    }

    function isAdsGradle(filePath) {
      const regex = /^ads-\d+\.\d+\.\d+\.gradle$/;
      const fileName = filePath.split(/[/\\]/).pop();
      return regex.test(fileName);
    }
    // 按文件夹分组，仅保留.aar文件
    function groupAarFilesByFolder(data) {
      const folderMap = new Map();

      data.forEach(file => {
        const endsWithAar = file.path.endsWith('-release.aar');
        const endsWithAds = isAdsGradle(file.path);
        if (!endsWithAar && !endsWithAds) return;

        const folderPath = file.path.substring(0, file.path.lastIndexOf('/') + 1);
        if (!folderMap.has(folderPath)) {
          folderMap.set(folderPath, []);
        }
        folderMap.get(folderPath).push(file);
      });

      return folderMap;
    }

    // 转义html，防止XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(text));
      return div.innerHTML;
    }

    // 根据文件后缀返回图标
    function getFileIcon(filePath) {
      const isFolder = filePath.endsWith('/');
      if (isFolder) return '📁';

      const ext = filePath.split('.').pop().toLowerCase();
      const iconMap = {
        apk: '📦',
        zip: '🗜️',
        rar: '🗜️',
        tar: '🗜️',
        gz: '🗜️',
        pdf: '📕',
        txt: '📕',
        md: '📘',
        html: '🌐',
        htm: '🌐',
        jpg: '🖼️',
        jpeg: '🖼️',
        png: '🖼️',
        gif: '🖼️',
        mp4: '🎬',
        mp3: '🎵',
        json: '🧩',
        xml: '📌',
        sh: '💻',
        exe: '⚙️',
        aar: '📄'
      };
      return iconMap[ext] || '📄';
    }

    function copyToClipboard(text, buttonElement) {
      navigator.clipboard.writeText(text).then(() => {
        const label = buttonElement.nextElementSibling;
        label.style.visibility = 'visible';
        setTimeout(() => {
          label.style.visibility = 'hidden';
        }, 1500);
      });
    }

    // 主渲染函数
    function renderTable(data, sdkRemark) {
      const tableBody = document.getElementById('fileTableBody');
      const base = window.document.baseURI;
      const folderMap = groupAarFilesByFolder(data);

      tableBody.innerHTML = '';

      if (data.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px;">暂无文件</td></tr>';
        return;
      }

      // 先显示非aar文件和文件夹
      data.forEach(file => {
        // 过滤aar文件（这些放在folderMap里处理）
        const endsWithAar = file.path.endsWith('-release.aar')
        const endsWithAds = isAdsGradle(file.path)
        if (endsWithAar || endsWithAds) return;

        // 过滤某些特殊文件（可选）
        if (file.path === "config/file_list.json" || file.path === "index.html" || file.path === "file_list.sh" || file.path == "offline.json") {
          return;
        }

        const row = document.createElement('tr');
        const fullUrl = base + file.path;
        const icon = getFileIcon(file.path);
        const isFolder = file.path.endsWith('/');

        row.innerHTML = `
          <td data-label="文件路径">
            <span class="file-icon">${icon}</span>
            <a href="${isFolder ? 'javascript:void(0)' : fullUrl}" ${isFolder ? `onclick="toggleFolder('${file.path}')" ` : `target="_blank"`}>${escapeHtml(file.path)}</a>
          </td>
          <td data-label="大小">${isFolder ? '-' : file.size}</td>
          <td data-label="修改时间">${file.modified_time}</td>
          <td data-label="操作">
            ${isFolder ? '' : `<button class="copy-btn" onclick="copyToClipboard('${fullUrl}', this)">复制</button>
            <span class="copied-label">已复制</span>`}
          </td>
        `;

        // 如果是文件夹，后面插入该文件夹内文件（非aar的）并默认隐藏，点击展开
        if (isFolder) {
          row.classList.add('folder-row');
          tableBody.appendChild(row);

          // 找出这个文件夹下的非aar文件（data里路径以该文件夹路径开头的，且不是aar）
          const childFiles = data.filter(f =>
            f.path.startsWith(file.path) &&
            !f.path.endsWith('-release.aar') &&
            f.path !== file.path // 排除自己
          );

          childFiles.forEach(childFile => {
            const childRow = document.createElement('tr');
            childRow.classList.add('child-row');
            childRow.dataset.parent = file.path;
            childRow.style.display = 'none';

            const childFullUrl = base + childFile.path;
            const childIcon = getFileIcon(childFile.path);
            const childIsFolder = childFile.path.endsWith('/');

            childRow.innerHTML = `
              <td data-label="文件路径">
                <span class="file-icon">${childIcon}</span>
                <a href="${childIsFolder ? 'javascript:void(0)' : childFullUrl}" ${childIsFolder ? `onclick="toggleFolder('${childFile.path}')" ` : `target="_blank"`}>${escapeHtml(childFile.path)}</a>
              </td>
              <td data-label="大小">${childIsFolder ? '-' : childFile.size}</td>
              <td data-label="修改时间">${childFile.modified_time}</td>
              <td data-label="操作">
                ${childIsFolder ? '' : `<button class="copy-btn" onclick="copyToClipboard('${childFullUrl}', this)">复制</button>
                <span class="copied-label">已复制</span>`}
              </td>
            `;

            tableBody.appendChild(childRow);
          });
        } else {
          // 普通文件直接添加行
          tableBody.appendChild(row);
        }
      });

      // 再显示.aar文件夹行（根据folderMap）
      const sdkOfflineList = Array.isArray(sdkRemark && sdkRemark["offline"]) ? sdkRemark["offline"] : [];
      const sortedFolderEntries = Array.from(folderMap.entries()).sort((a, b) => {
        const getFolderPriority = folderEntry => {
          const currentFolderPath = folderEntry[0];
          const folderName = currentFolderPath.replace(/\/+$/, '').split('/').pop();
          return sdkOfflineList.includes(folderName) ? 1 : 0;
        };

        return getFolderPriority(a) - getFolderPriority(b);
      });

      sortedFolderEntries.forEach(([folderPath, files]) => {
        // 如果这个文件夹已经被显示过（data中存在且为文件夹行），则不重复显示
        // 这里简单处理，不判断是否已显示，直接插入.aar文件夹行，可能重复（可根据需要优化）
        // 你也可以做去重，或者调整显示顺序

        const folderRow = document.createElement('tr');
        folderRow.classList.add('folder-row');
        folderRow.dataset.folder = folderPath;
        var statusText
        var developerText = ""
        if (folderPath.endsWith("dependencies/")) {
          statusText = "依赖文件[脚本]"
          developerText = "广告配置"
        } else {
          const fullPath = folderPath;
          const parts = fullPath.replace(/\/+$/, '').split('/');
          const lastFolder = parts.pop();
          if (sdkRemark != null) {
            try {
              const sdkOffline = sdkRemark["offline"]
              const sdkIsOffline = sdkOffline.includes(lastFolder)
              console.log(`${lastFolder} is included in sdkOffline : ${sdkIsOffline}`);
              if (sdkIsOffline) {
                statusText = "<font color=red>广告SDK[离线]</font>"
              } else {
                statusText = "广告SDK[在线]"
              }
            } catch(e) {
              statusText = "广告SDK[在线]"
            }

            try {
              const developerJson = sdkRemark["developer"]
              developerName = developerJson[`${lastFolder}`] || ""
              console.log(`${lastFolder} developer name is : ${developerName}`);
              developerText = `<font color="#007acc">${developerName}</font>`
            } catch(e) {
              console.log(`error : ${e}`)
              developerText = ""
            }
          } else {
            developerText = ""
            statusText = ""
          }
        }
        folderRow.innerHTML = `
          <td colspan="1">
            <span class="file-icon">📁</span>
            <a href="javascript:void(0)" onclick="toggleFolder('${folderPath}')">${escapeHtml(folderPath)}</a>
          </td>
          <td colspan="1">
            <span>${statusText}</span>
          </td>
          <td colspan="2">
            <span>${developerText}</span>
          </td>
        `;

        tableBody.appendChild(folderRow);

        files.forEach(file => {
          const fileRow = document.createElement('tr');
          fileRow.classList.add('child-row');
          fileRow.dataset.parent = folderPath;
          fileRow.style.display = 'none';

          const fullUrl = base + file.path;
          const icon = getFileIcon(file.path);

          fileRow.innerHTML = `
            <td data-label="文件路径">
              <span class="file-icon">${icon}</span>
              <a href="${fullUrl}" target="_blank">${escapeHtml(file.path)}</a>
            </td>
            <td data-label="大小">${file.size}</td>
            <td data-label="修改时间">${file.modified_time}</td>
            <td data-label="操作">
              <button class="copy-btn" onclick="copyToClipboard('${fullUrl}', this)">复制</button>
              <span class="copied-label">已复制</span>
            </td>
          `;

          tableBody.appendChild(fileRow);
        });
      });
    }

    // 展开或收起文件夹的子行
    function toggleFolder(folderPath) {
      // 处理两类子行：
      // 1. 非aar文件夹下的子行：class=child-row, data-parent=folderPath
      // 2. aar文件夹下的子行：class=child-row, data-parent=folderPath
      // 实际都是data-parent属性对应文件夹路径
      const childRows = document.querySelectorAll(`tr.child-row[data-parent="${folderPath}"]`);
      const isVisible = [...childRows].some(row => row.style.display !== 'none');

      childRows.forEach(row => {
        row.style.display = isVisible ? 'none' : '';
      });
    }
    function fetchOfflineData() {
      fetch('config/sdk_remark.json?timestamp=' + new Date().getTime())
        .then(response => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          return response.json();
        })
        .then(data => {
          // console.log(`data : ${data}`)
          fetchAndRenderTable(data)
        })
        .catch(error => {
          console.error('Error fetching the sdk_remark.json data:', error);
          fetchAndRenderTable(null)
        });
    }
    // 载入json并渲染
    function fetchAndRenderTable(sdkRemark) {
      fetch('config/file_list.json?timestamp=' + new Date().getTime())
        .then(response => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          return response.json();
        })
        .then(data => {
          renderTable(data, sdkRemark);
        })
        .catch(error => {
          document.getElementById('fileTableBody').innerHTML =
            `<tr><td colspan="4" style="text-align:center; color:red;">加载文件失败，请稍后重试。</td></tr>`;
          console.error('Error fetching the file_list.json data:', error);
        });
    }

    document.addEventListener('DOMContentLoaded', initAuth);
  </script>
</body>
</html>
