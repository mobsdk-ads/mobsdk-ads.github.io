def parseAabFileInfo(flavorName, aabFile) {
    def methodName = {
        "parseAabFileInfo"
    }
    def infoList = []
    def phaseCost = [:]
    def phaseStartAt = { ->
        System.currentTimeMillis()
    }
    def phaseEnd = { String phaseName, long startAt ->
        phaseCost[phaseName] = System.currentTimeMillis() - startAt
    }
    def putInfo = { String key, Object value ->
        infoList.add([key: key, value: value == null ? "" : String.valueOf(value)])
    }
    def formatHex = { byte[] bytes ->
        if (bytes == null || bytes.length == 0) {
            return ""
        }
        return bytes.collect { String.format("%02X", it & 0xFF) }.join(":")
    }
    def parseHexBytes = { String hexText ->
        if (hexText == null) {
            return null
        }
        String normalized = hexText.replace(":", "").replace(" ", "").trim()
        if (normalized.length() == 0) {
            return null
        }
        if (normalized.length() % 2 != 0) {
            throw new IllegalArgumentException("invalid hex length: " + normalized.length())
        }
        byte[] result = new byte[normalized.length() / 2]
        for (int i = 0; i < normalized.length(); i += 2) {
            result[i / 2] = (byte) Integer.parseInt(normalized.substring(i, i + 2), 16)
        }
        return result
    }
    def parseValue = { String text, String regex ->
        if (text == null || text.trim().length() == 0) {
            return ""
        }
        def matcher = (text =~ regex)
        if (matcher.find()) {
            return matcher.group(1)
        }
        return ""
    }
    def digestFileList = { File file, List<String> algorithms ->
        def digestStartAt = phaseStartAt()
        def digests = [:]
        algorithms.each { algorithm ->
            digests[algorithm] = MessageDigest.getInstance(algorithm)
        }
        file.withInputStream { input ->
            byte[] buffer = new byte[8192]
            int len
            while ((len = input.read(buffer)) > 0) {
                digests.values().each { digest ->
                    digest.update(buffer, 0, len)
                }
            }
        }
        def results = [:]
        digests.each { algorithm, digest ->
            results[algorithm] = digest.digest()
        }
        phaseEnd("fileDigest", digestStartAt)
        return results
    }

    byte[] certMd5 = null
    byte[] certSha1 = null
    byte[] certSha256 = null
    String certDn = ""
    String signDetail = ""

    def keytoolCmdList = isWindows() ?
            ["cmd", "/c", "keytool", "-printcert", "-jarfile", aabFile.absolutePath] :
            ["keytool", "-printcert", "-jarfile", aabFile.absolutePath]
    println "${taskTag()}:${project.name}:${methodName()} [$flavorName] commandString : [${keytoolCmdList.join(" ")}]"
    def keytoolStartAt = phaseStartAt()
    def keytoolResult = executeCommand(keytoolCmdList, 30)
    phaseEnd("keytoolPrintcert", keytoolStartAt)
    def keytoolOutput = keytoolResult.output
    if (!keytoolResult.finished) {
        putInfo("签名校验", "AAB keytool timeout")
    }
    if (keytoolResult.exitValue != 0 && keytoolResult.finished) {
        def errorDisplay = "keytool-Value : ${redText(keytoolResult.exitValue)}"
        println "${taskTag()}:${project.name}:${methodName()} [$flavorName] $errorDisplay"
    }
    if (keytoolResult.error != null && keytoolResult.error.trim().length() > 0) {
        String errorText = keytoolResult.error.trim().replaceAll('[\\r\\n]+', ' | ')
        if (errorText.length() > 200) {
            errorText = errorText.substring(0, 200) + "..."
        }
        println "${taskTag()}:${project.name}:${methodName()} [$flavorName] keytoolStderr : ${redText(errorText)}"
    }
    if (keytoolOutput != null && keytoolOutput.trim().length() > 0) {
        String md5Text = parseValue(keytoolOutput, /(?im)^MD5:\s*([0-9A-Fa-f:]+)/)
        String sha1Text = parseValue(keytoolOutput, /(?im)^SHA1:\s*([0-9A-Fa-f:]+)/)
        String sha256Text = parseValue(keytoolOutput, /(?im)^SHA256:\s*([0-9A-Fa-f:]+)/)
        String owner = parseValue(keytoolOutput, /(?im)^Owner:\s*(.+)/)
        String issuer = parseValue(keytoolOutput, /(?im)^Issuer:\s*(.+)/)
        String serialNumber = parseValue(keytoolOutput, /(?im)^Serial number:\s*(.+)/)
        String validFrom = parseValue(keytoolOutput, /(?im)^Valid from:\s*(.+)/)
        String sigAlgName = parseValue(keytoolOutput, /(?im)^Signature algorithm name:\s*(.+)/)
        String subjectPublicKeyAlgorithm = parseValue(keytoolOutput, /(?im)^Subject Public Key Algorithm:\s*(.+)/)
        String version = parseValue(keytoolOutput, /(?im)^Version:\s*(.+)/)
        if (md5Text) {
            certMd5 = parseHexBytes(md5Text)
        }
        if (sha1Text) {
            certSha1 = parseHexBytes(sha1Text)
        }
        if (sha256Text) {
            certSha256 = parseHexBytes(sha256Text)
        }
        certDn = owner
        signDetail = [
                owner ? "${owner}" : ""/*,
                owner ? "Owner=${owner}" : "",
                issuer ? "Issuer=${issuer}" : "",
                serialNumber ? "SerialNumber=${serialNumber}" : "",
                validFrom ? "ValidFrom=${validFrom}" : "",
                sigAlgName ? "SignatureAlgorithm=${sigAlgName}" : "",
                subjectPublicKeyAlgorithm ? "PublicKeyAlgorithm=${subjectPublicKeyAlgorithm}" : "",
                version ? "Version=${version}" : "",*/
        ].findAll { it != null && it.trim().length() > 0 }.join("; ")
    }

    if (certSha1 == null || certSha256 == null || certMd5 == null || !certDn) {
        def jarFallbackStartAt = phaseStartAt()
        java.util.jar.JarFile jarFile = new java.util.jar.JarFile(aabFile, true)
        try {
            byte[] buffer = new byte[8192]
            def entries = jarFile.entries()
            while (entries.hasMoreElements() && (certSha1 == null || certSha256 == null || certMd5 == null || !certDn)) {
                java.util.jar.JarEntry entry = entries.nextElement()
                if (entry.isDirectory() || entry.getName().startsWith("META-INF/")) {
                    continue
                }
                InputStream inputStream = jarFile.getInputStream(entry)
                try {
                    while (inputStream.read(buffer) != -1) {
                    }
                } finally {
                    inputStream.close()
                }
                def certificates = entry.getCertificates()
                if (certificates != null && certificates.length > 0 && certificates[0] instanceof java.security.cert.X509Certificate) {
                    java.security.cert.X509Certificate certificate = certificates[0]
                    byte[] certBytes = certificate.getEncoded()
                    certMd5 = MessageDigest.getInstance("MD5").digest(certBytes)
                    certSha1 = MessageDigest.getInstance("SHA-1").digest(certBytes)
                    certSha256 = MessageDigest.getInstance("SHA-256").digest(certBytes)
                    certDn = certificate.getSubjectX500Principal().getName()
                    if (!signDetail) {
                        signDetail = [
                                "${certificate.getSubjectX500Principal().getName()}"/*,
                                "Owner=${certificate.getSubjectX500Principal().getName()}",
                                "Issuer=${certificate.getIssuerX500Principal().getName()}",
                                "SerialNumber=${certificate.getSerialNumber().toString(16)}",
                                "ValidFrom=${certificate.getNotBefore()} until ${certificate.getNotAfter()}",
                                "SignatureAlgorithm=${certificate.getSigAlgName()}",
                                "PublicKeyAlgorithm=${certificate.getPublicKey() == null ? '' : certificate.getPublicKey().getAlgorithm()}",
                                "Version=${certificate.getVersion()}",*/
                        ].join("; ")
                    }
                }
            }
        } finally {
            jarFile.close()
        }
        phaseEnd("jarSignatureFallback", jarFallbackStartAt)
    }

    def fileDigestMap = digestFileList(aabFile, ["MD5", "SHA-1", "SHA-256"])

    putInfo("签名摘要", formatHex(certMd5))
    putInfo("签名哈希", formatHex(certSha1))
    putInfo("签名哈希", formatHex(certSha256))
    putInfo("散列密钥", certSha1 == null ? "" : certSha1.encodeBase64().toString())
    putInfo("签名详情", signDetail ?: certDn)

    putInfo("文件摘要", formatHex(fileDigestMap["MD5"]))
    putInfo("文件哈希", formatHex(fileDigestMap["SHA-1"]))
    putInfo("文件哈希", formatHex(fileDigestMap["SHA-256"]))

    return [
            infoList  : infoList,
            phaseCost : phaseCost,
            signMd5   : formatHex(certMd5),
            signSha1  : formatHex(certSha1),
            signSha256: formatHex(certSha256),
            signKey   : certSha1 == null ? "" : certSha1.encodeBase64().toString(),
            signDetail: signDetail ?: certDn,
            fileMd5   : formatHex(fileDigestMap["MD5"]),
            fileSha1  : formatHex(fileDigestMap["SHA-1"]),
            fileSha256: formatHex(fileDigestMap["SHA-256"]),
    ]
}

def parseApkFileInfo(flavorName, apkFile) {
    def methodName = {
        "parseApkFileInfo"
    }
    def infoList = []
    def phaseCost = [:]
    def missingText = "[数据缺失]"
    def phaseStartAt = { ->
        System.currentTimeMillis()
    }
    def phaseEnd = { String phaseName, long startAt ->
        phaseCost[phaseName] = (System.currentTimeMillis() - startAt) + "ms"
    }
    def putInfo = { String key, Object value ->
        infoList.add([key: key, value: value == null ? "" : String.valueOf(value)])
    }
    def formatHex = { byte[] bytes ->
        if (bytes == null || bytes.length == 0) {
            return ""
        }
        return bytes.collect { String.format("%02X", it & 0xFF) }.join(":")
    }
    def parseHexBytes = { String hexText ->
        if (hexText == null) {
            return null
        }
        String normalized = hexText.replace(":", "").replace(" ", "").trim()
        if (normalized.length() == 0) {
            return null
        }
        if (normalized.length() % 2 != 0) {
            throw new IllegalArgumentException("invalid hex length: " + normalized.length())
        }
        byte[] result = new byte[normalized.length() / 2]
        for (int i = 0; i < normalized.length(); i += 2) {
            result[i / 2] = (byte) Integer.parseInt(normalized.substring(i, i + 2), 16)
        }
        return result
    }
    def digestCache = [:]
    def digestFileList = { File file, List<String> algorithms ->
        def cacheKey = file.absolutePath
        if (digestCache.containsKey(cacheKey)) {
            return digestCache[cacheKey]
        }
        def digestStartAt = phaseStartAt()
        def digests = [:]
        algorithms.each { algorithm ->
            digests[algorithm] = MessageDigest.getInstance(algorithm)
        }
        file.withInputStream { input ->
            byte[] buffer = new byte[8192]
            int len
            while ((len = input.read(buffer)) > 0) {
                digests.values().each { digest ->
                    digest.update(buffer, 0, len)
                }
            }
        }
        def results = [:]
        digests.each { algorithm, digest ->
            results[algorithm] = digest.digest()
        }
        digestCache[cacheKey] = results
        phaseEnd("fileDigest", digestStartAt)
        return results
    }
    def digestFile = { File file, String algorithm ->
        def digestMap = digestFileList(file, ["MD5", "SHA-1", "SHA-256"])
        return digestMap[algorithm]
    }
    def formatFileSize = { long length ->
        if (length <= 0L) {
            return "0.00M"
        }
        return String.format(Locale.US, "%.2fM", length / 1024D / 1024D)
    }
    def findAssetEntryName = { File targetApkFile, String assetFileName ->
        if (targetApkFile == null || assetFileName == null || assetFileName.trim().isEmpty()) {
            return missingText
        }
        java.util.zip.ZipFile zipFile = new java.util.zip.ZipFile(targetApkFile)
        try {
            String entryName = "assets/" + assetFileName
            return zipFile.getEntry(entryName) != null ? assetFileName : "$missingText[$assetFileName]"
        } finally {
            zipFile.close()
        }
    }
    def parseAaptValue = { String text, String regex ->
        def matcher = (text =~ regex)
        if (matcher.find()) {
            return matcher.group(1)
        }
        return ""
    }
    def parseAaptValues = { String text, String regex ->
        def values = []
        def matcher = (text =~ regex)
        while (matcher.find()) {
            values.add(matcher.group(1))
        }
        return values
    }
    def formatPlatformList = { List<String> platforms ->
        if (platforms == null || platforms.isEmpty()) {
            return "无"
        }
        return platforms.join(";")
    }

    def parseManifestBoolean = { String text, String attrName ->
        def matcher = (text =~ ("A: android:" + attrName + "\\([^)]*\\)=((?:\\(type [^)]*\\))?(?:0x[0-9a-fA-F]+|true|false))"))
        if (matcher.find()) {
            String raw = matcher.group(1)
            raw = raw.replaceAll("\\(type [^)]*\\)", "").trim().toLowerCase(Locale.ROOT)
            if ("true".equals(raw) || "0xffffffff".equals(raw) || "0x1".equals(raw)) {
                return "true"
            }
            if ("false".equals(raw) || "0x0".equals(raw)) {
                return "false"
            }
            return raw
        }
        return ""
    }
    def parseManifestAttributeValue = { String text, String attrName ->
        if (text == null || text.trim().isEmpty()) {
            return ""
        }
        def quotedMatcher = (text =~ ("A: android:" + attrName + "\\([^)]*\\)=\\\"([^\\\"]*)\\\""))
        if (quotedMatcher.find()) {
            return quotedMatcher.group(1)
        }
        def rawMatcher = (text =~ ("A: android:" + attrName + "\\([^)]*\\)=[^\\n]*Raw: \\\"([^\\\"]*)\\\""))
        if (rawMatcher.find()) {
            return rawMatcher.group(1)
        }
        def refMatcher = (text =~ ("A: android:" + attrName + "\\([^)]*\\)=(@[^\\s\\n]+|0x[0-9a-fA-F]+)"))
        if (refMatcher.find()) {
            return refMatcher.group(1)
        }
        return ""
    }
    String aaptOutput = ""
    String manifestOutput = ""
    def aaptFile = checkAndroidAapt(flavorName)
    if (aaptFile != null && new File(aaptFile).exists()) {
        def aaptBadgingStartAt = phaseStartAt()
        def badgingResult = executeCommand([aaptFile, "dump", "badging", apkFile.absolutePath], 30)
        aaptOutput = badgingResult.output
        if (!badgingResult.finished) {
            putInfo("资源命令", "AAPT dump badging timeout")
        }
        if (badgingResult.exitValue != 0 && badgingResult.finished) {
            def errorDisplay = "badging-Value : ${redText(badgingResult.exitValue)}"
            println "${taskTag()}:${project.name}:${methodName()} [$flavorName] $errorDisplay"
        }
        if (badgingResult.error != null && badgingResult.error.trim().length() > 0) {
            String errorText = badgingResult.error.trim().replaceAll('[\\r\\n]+', ' | ')
            if (errorText.length() > 200) {
                errorText = errorText.substring(0, 200) + "..."
            }
            def errorDisplay = "badgingStderr : ${redText(errorText)}"
            println "${taskTag()}:${project.name}:${methodName()} [$flavorName] $errorDisplay"
        }
        phaseEnd("aaptBadging", aaptBadgingStartAt)

        def aaptManifestStartAt = phaseStartAt()
        def manifestResult = executeCommand([aaptFile, "dump", "xmltree", apkFile.absolutePath, "AndroidManifest.xml"], 30)
        manifestOutput = manifestResult.output
        if (!manifestResult.finished) {
            putInfo("资源命令", "AAPT dump xmltree timeout")
        }
        if (manifestResult.exitValue != 0 && manifestResult.finished) {
            def errorDisplay = "xmltree-Value : ${redText(manifestResult.exitValue)}"
            println "${taskTag()}:${project.name}:${methodName()} [$flavorName] $errorDisplay"
        }
        if (manifestResult.error != null && manifestResult.error.trim().length() > 0) {
            String errorText = manifestResult.error.trim().replaceAll('[\\r\\n]+', ' | ')
            if (errorText.length() > 200) {
                errorText = errorText.substring(0, 200) + "..."
            }
            def errorDisplay = "xmltreeStderr : ${redText(errorText)}"
            println "${taskTag()}:${project.name}:${methodName()} [$flavorName] $errorDisplay"
        }
        phaseEnd("aaptManifest", aaptManifestStartAt)
    }

    def appLabel = parseAaptValue(aaptOutput, /application-label:'([^']*)'/)
    if (!appLabel) {
        appLabel = parseAaptValue(aaptOutput, /application:\s+label='([^']*)'/)
    }
    def packageName = parseAaptValue(aaptOutput, /package:\s+name='([^']*)'/)
    def launchActivity = ""
    def manifestActivityNames = []
    def manifestMetaData = [:]
    if (manifestOutput) {
        def manifestParseStartAt = phaseStartAt()
        def currentBlock = null
        def flushActivityBlock = { List<String> blockLines ->
            if (blockLines == null || blockLines.isEmpty()) {
                return
            }
            if (!(blockLines[0].startsWith("E: activity ") || blockLines[0].startsWith("E: activity-alias "))) {
                return
            }
            String blockText = blockLines.join("\n")
            def matcher = (blockText =~ /A: android:name\([^)]*\)=\"([^\"]+)\"/)
            if (matcher.find()) {
                String activityName = matcher.group(1)
                if (activityName.startsWith(".") && packageName) {
                    activityName = packageName + activityName
                }
                manifestActivityNames.add(activityName.toLowerCase(Locale.ROOT))
                if (!launchActivity && blockText.contains("android.intent.action.MAIN") && blockText.contains("android.intent.category.LAUNCHER")) {
                    launchActivity = activityName
                }
            }
        }
        def flushMetaDataBlock = { List<String> blockLines ->
            if (blockLines == null || blockLines.isEmpty()) {
                return
            }
            if (!blockLines[0].startsWith("E: meta-data ")) {
                return
            }
            String blockText = blockLines.join("\n")
            String metaName = parseManifestAttributeValue(blockText, "name")
            if (!metaName) {
                return
            }
            String metaValue = parseManifestAttributeValue(blockText, "value")
            if (!metaValue) {
                metaValue = parseManifestAttributeValue(blockText, "resource")
            }
            manifestMetaData[metaName] = metaValue
        }
        manifestOutput.eachLine { line ->
            String trimLine = line.trim()
            if (trimLine.startsWith("E: activity ") || trimLine.startsWith("E: activity-alias ")) {
                flushActivityBlock(currentBlock)
                flushMetaDataBlock(currentBlock)
                currentBlock = []
            }
            if (trimLine.startsWith("E: meta-data ")) {
                flushActivityBlock(currentBlock)
                flushMetaDataBlock(currentBlock)
                currentBlock = []
            }
            if (currentBlock != null) {
                currentBlock.add(trimLine)
            }
        }
        flushActivityBlock(currentBlock)
        flushMetaDataBlock(currentBlock)
        phaseEnd("manifestParse", manifestParseStartAt)
    }

    def versionCode = parseAaptValue(aaptOutput, /versionCode='([^']*)'/)
    def versionName = parseAaptValue(aaptOutput, /versionName='([^']*)'/)
    def minSdk = parseAaptValue(aaptOutput, /sdkVersion:'([^']*)'/)
    def targetSdk = parseAaptValue(aaptOutput, /targetSdkVersion:'([^']*)'/)
    def fileSize = formatFileSize(apkFile.length())
    def allPermissions = parseAaptValues(aaptOutput, /uses-permission(?:-[^:]*)?:\s+name='([^']+)'/)
    def adId = "com.google.android.gms.permission.AD_ID"
    def adIdPermission = allPermissions.find { it == adId } ?: "$missingText[$adId]"
    def highRiskPermissionSet = [
            "android.permission.QUERY_ALL_PACKAGES",
            "android.permission.SYSTEM_ALERT_WINDOW",
            "android.permission.REQUEST_INSTALL_PACKAGES",
            "android.permission.MANAGE_EXTERNAL_STORAGE",
            "android.permission.READ_PHONE_STATE",
            "android.permission.READ_PHONE_NUMBERS",
            "android.permission.ACCESS_FINE_LOCATION",
            "android.permission.ACCESS_COARSE_LOCATION",
            "android.permission.POST_NOTIFICATIONS",
            "android.permission.RECORD_AUDIO",
            "android.permission.CAMERA",
            "android.permission.READ_CONTACTS",
            "android.permission.WRITE_CONTACTS",
            "android.permission.READ_CALENDAR",
            "android.permission.WRITE_CALENDAR",
    ] as Set
    def highRiskPermissions = allPermissions.findAll { highRiskPermissionSet.contains(it) }.collect { it.replace("android.permission.", "") }
    def debuggable = parseManifestBoolean(manifestOutput, "debuggable")
    def usesCleartextTraffic = parseManifestBoolean(manifestOutput, "usesCleartextTraffic")
    def admobAppId = manifestMetaData["com.google.android.gms.ads.APPLICATION_ID"] ?: "$missingText"
    def facebookAppId = manifestMetaData["com.facebook.sdk.ApplicationId"] ?: ""
    def facebookToken = manifestMetaData["com.facebook.sdk.ClientToken"] ?: ""
    def adConfigFileName = generateAdConfigFileName(flavorName)
    def adConfigExistsName = findAssetEntryName(apkFile, adConfigFileName)
    if (facebookAppId == null || facebookAppId.trim().isEmpty()) {
        facebookAppId = missingText
    }
    if (facebookToken == null || facebookToken.trim().isEmpty()) {
        facebookToken = missingText
    }
    if (!debuggable) {
        debuggable = "false"
    }
    if (!usesCleartextTraffic) {
        try {
            usesCleartextTraffic = Integer.parseInt(targetSdk) >= 28 ? "false" : "true"
        } catch (Exception ignored) {
            usesCleartextTraffic = "false"
        }
    }
    def toEnabledStatus = { String value ->
        if ("true".equalsIgnoreCase(value)) {
            return "开启"
        }
        if ("false".equalsIgnoreCase(value)) {
            return "关闭"
        }
        return value
    }

    putInfo("应用名称", appLabel)
    putInfo("应用入口", launchActivity)
    putInfo("应用包名", packageName)
    putInfo("应用版本", "$versionName($versionCode)")
    putInfo("编译版本", "minSdk:$minSdk;targetSdk:$targetSdk")
    putInfo("文件大小", fileSize)

    putInfo("敏感权限", formatPlatformList(highRiskPermissions))
    putInfo("调试开关", toEnabledStatus(debuggable))
    putInfo("明文传输", toEnabledStatus(usesCleartextTraffic))

    putInfo("谷歌广告", admobAppId)
    putInfo("脸书标识", facebookAppId)
    putInfo("脸书令牌", facebookToken)

    putInfo("广告配置", adConfigExistsName)

    putInfo("广告权限", adIdPermission)

    def adPlatformRules = [
            [name: "Applovin", pattern: ["com.applovin.", "applovinfullscreenactivity", "mediationdebuggeractivity"]],
            [name: "BidMachine", pattern: ["io.bidmachine."]],
            [name: "Bigo", pattern: ["sg.bigo.ads.", "com.bigossp."]],
            [name: "Chartboost", pattern: ["com.chartboost.", "cbimpressionactivity"]],
            [name: "Facebook", pattern: ["com.facebook.ads."]],
            [name: "Fyber", pattern: ["com.fyber.", "com.inneractive."]],
            [name: "Google", pattern: ["com.google.android.gms.ads.", "com.google.ads.", "adactivity"]],
            [name: "IronSource", pattern: ["com.ironsource.", "com.supersonicads."]],
            [name: "Mintegral", pattern: ["com.mbridge.msdk.", "com.mintegral."]],
            [name: "MyTarget", pattern: ["com.my.target."]],
            [name: "Pangle", pattern: ["com.bytedance.sdk.openadsdk.", "com.pgl.ssdk.", "com.pangle.global."]],
            [name: "Smaato", pattern: ["com.smaato."]],
            [name: "TradPlusAdx", pattern: ["com.tradplus.", "tp.exchange"]],
            [name: "Unity3D", pattern: ["com.unity3d.services.ads.", "com.unity3d.ads."]],
            [name: "Vungle", pattern: ["com.vungle.", "vungle.warren."]],
            [name: "Verve", pattern: ["net.pubnative.", "verve."]],
            [name: "Yandex", pattern: ["com.yandex.mobile.ads."]],
    ]
    def matchedPlatforms = []
    adPlatformRules.each { rule ->
        boolean matched = manifestActivityNames.any { activityName ->
            rule.pattern.any { keyword -> activityName.contains(keyword) }
        }
        if (matched) {
            matchedPlatforms.add(rule.name)
        }
    }
    putInfo("广告平台", formatPlatformList(matchedPlatforms))

    byte[] certMd5 = null
    byte[] certSha1 = null
    byte[] certSha256 = null
    String certDn = ""
    def signSchemes = []
    def apksignerFile = null
    if (aaptFile != null) {
        def aaptParent = new File(aaptFile).getParentFile()
        if (aaptParent != null) {
            def apksignerName = isWindows() ? "apksigner.bat" : "apksigner"
            def candidate = new File(aaptParent, apksignerName)
            if (candidate.exists()) {
                apksignerFile = candidate
            }
        }
    }
    if (apksignerFile != null) {
        def apksignerStartAt = phaseStartAt()
        def cmdList = isWindows() ?
                ["cmd", "/c", apksignerFile.absolutePath, "verify", "--verbose", "--print-certs", apkFile.absolutePath] :
                [apksignerFile.absolutePath, "verify", "--verbose", "--print-certs", apkFile.absolutePath]
        println "${taskTag()}:${project.name}:${methodName()} [$flavorName] commandString : [${cmdList.join(" ")}]"
        def signerResult = executeCommand(cmdList, 30)
        def signerOutput = signerResult.output
        if (!signerResult.finished) {
            putInfo("签名校验", "APK apksigner timeout")
        }
        if (signerResult.exitValue != 0 && signerResult.finished) {
            def errorDisplay = "apksignerExit : ${redText(signerResult.exitValue)}"
            println "${taskTag()}:${project.name}:${methodName()} [$flavorName] $errorDisplay"
        }
        if (signerResult.error != null && signerResult.error.trim().length() > 0) {
            String errorText = signerResult.error.trim().replaceAll('[\\r\\n]+', ' | ')
            if (errorText.length() > 200) {
                errorText = errorText.substring(0, 200) + "..."
            }
            def errorDisplay = "apksignStderr : ${redText(errorText)}"
            println "${taskTag()}:${project.name}:${methodName()} [$flavorName] $errorDisplay"
        }
        phaseEnd("apksignerVerify", apksignerStartAt)
        if ((signerOutput =~ /Verified using v1 scheme.*:\s*true/).find()) {
            signSchemes.add("V1")
        }
        if ((signerOutput =~ /Verified using v2 scheme.*:\s*true/).find()) {
            signSchemes.add("V2")
        }
        if ((signerOutput =~ /Verified using v3 scheme(?!\.1).*\:\s*true/).find()) {
            signSchemes.add("V3")
        }
        if ((signerOutput =~ /Verified using v3\.1 scheme.*:\s*true/).find()) {
            signSchemes.add("V3.1")
        }
        if ((signerOutput =~ /Verified using v4 scheme.*:\s*true/).find()) {
            signSchemes.add("V4")
        }
        String md5Text = parseAaptValue(signerOutput, /Signer #\d+ certificate MD5 digest:\s*([0-9A-Fa-f:]+)/)
        String sha1Text = parseAaptValue(signerOutput, /Signer #\d+ certificate SHA-1 digest:\s*([0-9A-Fa-f:]+)/)
        String sha256Text = parseAaptValue(signerOutput, /Signer #\d+ certificate SHA-256 digest:\s*([0-9A-Fa-f:]+)/)
        certDn = parseAaptValue(signerOutput, /Signer #\d+ certificate DN:\s*(.+)/)
        if (md5Text) {
            certMd5 = parseHexBytes(md5Text)
        }
        if (sha1Text) {
            certSha1 = parseHexBytes(sha1Text)
        }
        if (sha256Text) {
            certSha256 = parseHexBytes(sha256Text)
        }
    }
    if (certSha1 == null || certSha256 == null || certMd5 == null || !certDn) {
        def jarFallbackStartAt = phaseStartAt()
        java.util.jar.JarFile jarFile = new java.util.jar.JarFile(apkFile, true)
        try {
            byte[] buffer = new byte[8192]
            def entries = jarFile.entries()
            while (entries.hasMoreElements() && (certSha1 == null || certSha256 == null || certMd5 == null || !certDn)) {
                java.util.jar.JarEntry entry = entries.nextElement()
                if (entry.isDirectory() || entry.getName().startsWith("META-INF/")) {
                    continue
                }
                InputStream inputStream = jarFile.getInputStream(entry)
                try {
                    while (inputStream.read(buffer) != -1) {
                    }
                } finally {
                    inputStream.close()
                }
                def certificates = entry.getCertificates()
                if (certificates != null && certificates.length > 0 && certificates[0] instanceof java.security.cert.X509Certificate) {
                    java.security.cert.X509Certificate certificate = certificates[0]
                    byte[] certBytes = certificate.getEncoded()
                    certMd5 = MessageDigest.getInstance("MD5").digest(certBytes)
                    certSha1 = MessageDigest.getInstance("SHA-1").digest(certBytes)
                    certSha256 = MessageDigest.getInstance("SHA-256").digest(certBytes)
                    certDn = certificate.getSubjectX500Principal().getName()
                }
            }
        } finally {
            jarFile.close()
        }
        phaseEnd("jarSignatureFallback", jarFallbackStartAt)
    }

    putInfo("签名摘要", formatHex(certMd5))
    putInfo("签名哈希", formatHex(certSha1))
    putInfo("签名哈希", formatHex(certSha256))
    putInfo("签名详情", certDn)
    putInfo("散列密钥", certSha1 == null ? "" : certSha1.encodeBase64().toString())

    putInfo("文件摘要", formatHex(digestFile(apkFile, "MD5")))
    putInfo("文件哈希", formatHex(digestFile(apkFile, "SHA-1")))
    putInfo("文件哈希", formatHex(digestFile(apkFile, "SHA-256")))

    putInfo("签名方案", formatPlatformList(signSchemes))

    return [
            appLabel      : appLabel,
            launchActivity: launchActivity,
            packageName   : packageName,
            versionCode   : versionCode,
            versionName   : versionName,
            minSdk        : minSdk,
            targetSdk     : targetSdk,
            fileSize      : fileSize,
            admobAppId    : admobAppId,
            facebookAppId : facebookAppId,
            facebookToken : facebookToken,
            adConfigFile  : adConfigExistsName,
            infoList      : infoList,
            phaseCost     : phaseCost,
    ]
}

def analyzingBundlesInternal(flavorName, bundleFile) {
    def methodName = { "analyzingBundles" }
    println "${taskTag()}:${project.name}:${methodName()} [" + flavorName + "] " + greenText("============>")
    println "${taskTag()}:${project.name}:${methodName()} [" + flavorName + "] finalFileName : [" + (bundleFile == null ? "null" : bundleFile.getAbsolutePath()) + "]"
    if (bundleFile == null || !bundleFile.exists()) {
        def errorDisplay = redText("bundle file is not exist")
        println "${taskTag()}:${project.name}:${methodName()} [" + flavorName + "] $errorDisplay"
        return
    }
    try {
        if (bundleFile.getName().endsWith(".aab")) {
            def aabInfo = parseAabFileInfo(flavorName, bundleFile)
            def apkFile = new File(bundleFile.getParentFile(), bundleFile.getName().replace(".aab", ".apk"))
            def apkInfo = null
            if (apkFile.exists()) {
                apkInfo = parseApkFileInfo(flavorName, apkFile)
            } else {
                apkInfo = null
            }
            printAnalyzeBundleInfo(flavorName, bundleFile, aabInfo, apkInfo)
        } else {
            def apkInfo = parseApkFileInfo(flavorName, bundleFile)
            printAnalyzeBundleInfo(flavorName, bundleFile, null, apkInfo)
        }
    } catch (Exception e) {
        println "${taskTag()}:${project.name}:${methodName()} [" + flavorName + "] error : " + e
        e.printStackTrace()
    }
}

def printAnalyzeBundleInfo(flavorName, bundleFile, aabInfo, apkInfo) {
    def methodName = { "analyzingBundles" }
    def separator = "------------------------------------------------------------------------------------------------------------------------------------"
