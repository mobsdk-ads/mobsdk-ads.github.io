                    println "${taskTag()}:${project.name}:${methodName()} [$flavor] CommandResult : " + result
                } else {
                    println "${taskTag()}:${project.name}:${methodName()} [$flavor] No bundleMetaData to remove"
                }
            }
        }
    }
}

