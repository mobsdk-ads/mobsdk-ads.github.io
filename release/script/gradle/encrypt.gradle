def zippingExtraFile(flavor, bundleFilePath) {
    def methodName = { "zippingExtraFile" }
    def outputFile = file(bundleFilePath)
    try {
        if (outputFile != null && outputFile.exists()) {
            def tmpDir = outputFile.getParentFile()
            if (outputFile.getName().endsWith(".apk")) {
                def outputDir = new File(getBuildDir(), "outputs")
                def releaseFlavor = (flavor != null) ? flavor + "Release" : "release"
                def mappingDir = new File(outputDir, "mapping")
                def mappingReleaseDir = new File(mappingDir, releaseFlavor)
                def srcMappingFile = new File(mappingReleaseDir, "mapping.txt")
                def dstMappingFile = new File(tmpDir, "mapping.txt")
                Files.copy(srcMappingFile.toPath(), dstMappingFile.toPath(), StandardCopyOption.REPLACE_EXISTING)
            }
            def outputName = outputFile.getName()
            def fileTree = fileTree(dir: tmpDir)
            fileTree.include("*.txt")
            def waitForZipFiles = [] as Set
            fileTree.each { file ->
                if (file.name.endsWith(".txt")) {
                    waitForZipFiles.add(file)
                }
            }
            println ""
            println "${taskTag()}:${project.name}:${methodName()} [$flavor] allExtraFiles : $waitForZipFiles"
            if (waitForZipFiles.size() > 0) {
                def dstMapZipName = outputName.replaceAll(/\.[^.]+$/, ".zip")
                def dstMapZipFile = new File(tmpDir, dstMapZipName)
                if (dstMapZipFile.exists()) {
                    dstMapZipFile.delete()
                }
                println "${taskTag()}:${project.name}:${methodName()} [$flavor] outputZipFile : $dstMapZipFile"
                ant.zip(destfile: dstMapZipFile.absolutePath) {
                    for (file in waitForZipFiles) {
                        fileset(file: file.absolutePath)
                    }
                    fileset(file: outputFile.absolutePath)
                }
                waitForZipFiles.each {
                    it.delete()
                }
            }
        }
    } catch (Exception e) {
        println "${taskTag()}:${project.name}:${methodName()} [$flavor] outputZipFile : $e"
    }
}

