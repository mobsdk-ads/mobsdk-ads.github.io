def transformAab2ApkInternalLocked(flavorName, finalBundleFile) {
    def methodName = {
        "transformAab2Apk"
    }

    println "${taskTag()}:${project.name}:${methodName()} [" + flavorName + "] finalBundleFile : " + finalBundleFile
    if (finalBundleFile == null || !finalBundleFile.exists()) {
        println "${taskTag()}:${project.name}:${methodName()} [" + flavorName + "] finalBundleFile is not exist ###"
        return
    }
    def signConfig = getAab2ApkSignConfig(flavorName)
    println "${taskTag()}:${project.name}:${methodName()} [" + flavorName + "] signConfigInfos : ${signConfig}"
    if (signConfig == null) {
        System.err.println "${taskTag()}:${project.name}:${methodName()} [" + flavorName + "] signConfigInfos is Null"
        return
    }
    if (!signConfig.containsKey("storeFile")
            || !signConfig.containsKey("storePassword")
            || !signConfig.containsKey("keyAlias")
            || !signConfig.containsKey("keyPassword")) {
        System.err.println "${taskTag()}:${project.name}:${methodName()} [" + flavorName + "] signConfigInfos is not completion"
        return
    }
    def bundleFileName = "bundletool-all-1.16.0.jar"
    def bundleToolDir = new File(gradle.gradleUserHomeDir, "bundletool")
    bundleToolDir.mkdirs()
    def bundleToolPath = new File(bundleToolDir, bundleFileName).getAbsolutePath()
    def bundleToolPathCompleteFile = new File(bundleToolDir, bundleFileName + ".lock").getAbsolutePath()
