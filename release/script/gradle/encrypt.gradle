def verifyAabSigning(flavor, aabFile) {
    def methodName = {
        "verifyAabSigning"
    }
    println "${taskTag()}:${project.name}:${methodName()} [$flavor] finalAabFile : ${aabFile}"
    if (aabFile == null || !aabFile.exists()) {
        println "${taskTag()}:${project.name}:${methodName()} [$flavor] ${redText("aabFile is not exist")}"
        return false
    }
    def resolveJavaTool = { String toolName ->
        def suffix = isWindows() ? ".exe" : ""
        def javaHome = System.getenv("JAVA_HOME")
        if (javaHome != null && javaHome.trim().length() > 0) {
            def toolFile = new File(javaHome + File.separator + "bin" + File.separator + toolName + suffix)
            if (toolFile.exists()) {
                return toolFile.absolutePath
            }
        }
        return toolName
    }
    def normalizeEntryName = { String entryName ->
        if (entryName == null) {
            return ""
        }
        return entryName.replace("\\", "/").trim()
    }
    def parseManifestEntryNames = { InputStream inputStream ->
        def entryNames = [] as Set
        if (inputStream == null) {
            return entryNames
        }
        BufferedReader reader = new BufferedReader(new InputStreamReader(inputStream, StandardCharsets.UTF_8))
        try {
            String line
            String currentName = null
            while ((line = reader.readLine()) != null) {
                if (line.startsWith("Name: ")) {
                    if (currentName != null && currentName.trim().length() > 0) {
                        entryNames.add(normalizeEntryName(currentName))
                    }
                    currentName = line.substring("Name: ".length())
                } else if (line.startsWith(" ")) {
                    if (currentName != null) {
                        currentName += line.substring(1)
                    }
                } else if (line.trim().length() == 0) {
                    if (currentName != null && currentName.trim().length() > 0) {
                        entryNames.add(normalizeEntryName(currentName))
                    }
                    currentName = null
                }
            }
            if (currentName != null && currentName.trim().length() > 0) {
                entryNames.add(normalizeEntryName(currentName))
            }
        } finally {
            reader.close()
        }
        return entryNames
    }

    def jarsignerCommand = resolveJavaTool("jarsigner")
    def verifyCmdList = isWindows() ?
            ["cmd", "/c", jarsignerCommand, "-verify", "-certs", aabFile.absolutePath] :
            [jarsignerCommand, "-verify", "-certs", aabFile.absolutePath]
    println "${taskTag()}:${project.name}:${methodName()} [$flavor] verifyCommand : [${verifyCmdList.join(" ")}]"
    def verifyResult = executeCommand(verifyCmdList, 60)
    if (!verifyResult.finished || verifyResult.exitValue != 0) {
        println "${taskTag()}:${project.name}:${methodName()} [$flavor] ${redText("jarsigner verify failed")}"
        if (verifyResult.error != null && verifyResult.error.trim().length() > 0) {
            def errorMessage = verifyResult.error.trim().replaceAll('[\\r\\n]+', ' | ')
            println "${taskTag()}:${project.name}:${methodName()} [$flavor] stderr : ${redText(errorMessage)}"
        }
        return false
    }
    ZipFile zipFile = new ZipFile(aabFile)
    try {
        ZipEntry manifestEntry = zipFile.getEntry("META-INF/MANIFEST.MF")
        if (manifestEntry == null || manifestEntry.isDirectory()) {
            println "${taskTag()}:${project.name}:${methodName()} [$flavor] ${redText("META-INF/MANIFEST.MF is missing")}"
            return false
        }
        def manifestEntryNames = parseManifestEntryNames(zipFile.getInputStream(manifestEntry))
        if (manifestEntryNames == null || manifestEntryNames.isEmpty()) {
            println "${taskTag()}:${project.name}:${methodName()} [$flavor] ${redText("manifest entries is empty")}"
            return false
        }
        def actualEntryNames = [] as Set
        def unsignedEntries = []
        zipFile.entries().each { ZipEntry entry ->
            if (entry == null || entry.isDirectory()) {
                return
            }
            def entryName = normalizeEntryName(entry.name)
            if (entryName.startsWith("META-INF/")) {
                return
            }
            actualEntryNames.add(entryName)
            if (!manifestEntryNames.contains(entryName)) {
                unsignedEntries.add(entryName)
            }
        }
        if (!unsignedEntries.isEmpty()) {
            println "${taskTag()}:${project.name}:${methodName()} [$flavor] ${redText("aab contains unsigned entries")}"
            println "${taskTag()}:${project.name}:${methodName()} [$flavor] unsignedEntries : ${unsignedEntries}"
            return false
        }
        def missingEntries = manifestEntryNames.findAll { manifestEntryName ->
            manifestEntryName != null
                    && manifestEntryName.trim().length() > 0
                    && !manifestEntryName.startsWith("META-INF/")
                    && !actualEntryNames.contains(manifestEntryName)
        }
        if (!missingEntries.isEmpty()) {
            println "${taskTag()}:${project.name}:${methodName()} [$flavor] ${redText("aab is missing manifest entries")}"
            println "${taskTag()}:${project.name}:${methodName()} [$flavor] missingEntries : ${missingEntries}"
            return false
        }
    } finally {
        zipFile.close()
    }
    println "${taskTag()}:${project.name}:${methodName()} [$flavor] ${greenText("aab signing verify success")}"
    return true
}
