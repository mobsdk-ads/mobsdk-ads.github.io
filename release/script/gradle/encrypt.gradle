def appendChannelToAabFile(aabFilePath, channel, releaseDir, flavorName, channelFileName) {
    def methodName = {
        "appendChannelsFile"
    }
    println "${taskTag()}:${project.name}:${methodName()} [" + flavorName + "][" + channel + "] >>>>>>>>> Append Channels File Start <<<<<<<<<"
    println "${taskTag()}:${project.name}:${methodName()} [" + flavorName + "][" + channel + "] BaseApk [" + aabFilePath + "]"

    // 创建渠道文件
    File tempBase = new File(releaseDir, "base")
    tempBase.mkdirs()
    File tempAssets = new File(tempBase, "assets")
    tempAssets.mkdirs()
    if (channelFileName == null) {
        channelFileName = "ss_channel_cfg"
    }
    File channelFile = new File(tempAssets, channelFileName)

    // 给渠道文件写入渠道号
    FileWriter writer = new FileWriter(channelFile, false)
    writer.write(channel)
    writer.close()

    // 添加渠道文件到assets目录
    def cwd = new File(aabFilePath).getParent()
    appendFilesIntoApk(cwd, aabFilePath, ["base/assets/" + channelFileName], flavorName)
    // 删除临时渠道文件
    channelFile.delete()
    tempAssets.delete()
    tempBase.delete()
    println "${taskTag()}:${project.name}:${methodName()} [" + flavorName + "][" + channel + "] >>>>>>>>> Append Channels File Complete <<<<<<<<<\n"
}

