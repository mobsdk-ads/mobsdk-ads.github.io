def getFileListByExtension(flavorName, extension) {
    def fileLisetSet = [] as Set
    def outputFile = new File(project.buildDir, "outputs")
    FileTree mainTree = fileTree(dir: outputFile)
    if (flavorName != null) {
        mainTree.include("apk/${flavorName}**/**/*.$extension", "bundle/${flavorName}**/**/*.$extension")
    } else {
        mainTree.include("apk/**/*.$extension", "bundle/**/*.$extension")
    }
    mainTree.each {
        fileLisetSet.add(it)
    }
    return fileLisetSet
}
