def removeSpecialMap(flavor) {
    def methodName = { "removeSpecialMap" }
    List<String> blackStringList = null
    if (ext != null && ext.has("proguardBlackString")) {
        blackStringList = ext["proguardBlackString"]
    }
    if (blackStringList == null) {
        blackStringList = []
    }
    blackStringList.add("com.sdkhub.")
    if (blackStringList != null && !blackStringList.isEmpty()) {
        def flavorName = flavor != null ? flavor : ""
        def mappingFile = null
        def mappingBack = null
        def mappingTemp = null
        def cleanedFile = null
        def outputDir = getBuildDir()
        outputDir = new File(outputDir, "outputs")
        def aarFileDir = new File(outputDir, "bundle")
        if (flavor != null) {
            aarFileDir = new File(aarFileDir, flavorName + "Release")
        } else {
            aarFileDir = new File(aarFileDir, "release")
        }
        def mappingDir = new File(outputDir, "mapping")
        if (flavor != null) {
            mappingDir = new File(mappingDir, flavorName + "Release")
        } else {
            mappingDir = new File(mappingDir, "release")
        }
        File[] outputFileList = mappingDir.listFiles()
        def mappingVersionFileName = "mapping.txt"
        if (outputFileList != null && outputFileList.length > 0) {
            mappingFile = new File(mappingDir, "mapping.txt")
            mappingBack = new File(aarFileDir, mappingVersionFileName)
            mappingTemp = new File(mappingDir, "mapping-cleaned-temp.txt")
            cleanedFile = new File(mappingDir, "mapping-cleaned.txt")
        }
        println "${taskTag()}:${project.name}:${methodName()} [$flavor] mappingDir : " + mappingDir
        println "${taskTag()}:${project.name}:${methodName()} [$flavor] outputFile : " + mappingFile
        println "${taskTag()}:${project.name}:${methodName()} [$flavor] allOutputs : " + mappingDir.list()
        if (mappingFile != null && mappingFile.exists()) {
            println "${taskTag()}:${project.name}:${methodName()} [$flavor] processing : 打包前移除混淆符号$blackStringList"
            if (mappingBack != null) {
                if (mappingBack.exists()) {
                    mappingBack.delete()
                }
                mappingBack.getParentFile().mkdirs()
                Files.copy(mappingFile.toPath(), mappingBack.toPath())
            }
            def cleanedCount = 0
            def proguardList = []
            def isRemove = false
            def isProguardStart = false

            def reader = mappingFile.newReader()
            def writer = mappingTemp.newWriter()
            def resultWriter = cleanedFile.newWriter()
            try {
                reader.eachLine { line ->
                    if (line.endsWith(":")) {
                        if (proguardList) {    // 处理上一块
                            if (isRemove) {
                                cleanedCount += proguardList.size()
                                proguardList.each { resultWriter.writeLine(it) }
                            } else {
                                proguardList.each { writer.writeLine(it) }
                            }
                            proguardList.clear()
                            isRemove = false
                        }
                        // 新块初始化
                        isProguardStart = true
                        proguardList.add(line)
                        if (blackStringList.any { line.contains(it) }) {
                            isRemove = true
                        }
                    } else {
                        if (isProguardStart) {
                            proguardList.add(line)
                            if (blackStringList.any { line.contains(it) }) {
                                isRemove = true
                            }
                        } else {
                            writer.writeLine(line)
                        }
                    }
                }
                // 处理最后一块
                if (proguardList) {
                    if (isRemove) {
                        cleanedCount += proguardList.size()
                        proguardList.each { resultWriter.writeLine(it) }
                    } else {
                        proguardList.each { writer.writeLine(it) }
                    }
                }
                isRemove = false
                proguardList.clear()
            } finally {
                reader.close()
                writer.close()
                resultWriter.close()
            }

            mappingFile.delete()
            mappingTemp.renameTo(mappingFile)
            println "${taskTag()}:${project.name}:${methodName()} [$flavor] processing : complete count [$cleanedCount]"
        }
    }
}
/**
 * 列出 zip/aab 文件中指定目录数组下的所有非目录文件路径。
 *
 * @param zipPath zip 或 aab 文件路径
 * @param dirPrefixes 要列出的目录前缀数组，例如 ["BUNDLE-METADATA/", "base/"]
 * @return 包含所有匹配文件路径的 List<String>
 */
def listZipDirectoryEntries(String zipPath, List<String> dirPrefixes) {
    def entries = []

    ZipFile zipFile = new ZipFile(zipPath)
    zipFile.entries().each { ZipEntry entry ->
        if (!entry.isDirectory()) {
            for (prefix in dirPrefixes) {
                if (entry.name.startsWith(prefix)) {
                    entries << entry.name
                    break  // 找到匹配就跳出for，避免重复添加
                }
            }
        }
    }
    zipFile.close()
    return entries
}

