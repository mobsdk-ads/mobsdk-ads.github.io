def checkAndroidAapt(flavorName) {
    def methodName = { "checkAndroidAapt" }
    def sdkDir = null
    try {
        Properties properties = new Properties()
        InputStream inputStream = project.rootProject.file('local.properties').newDataInputStream();
        properties.load(inputStream)
        //读取文件
        sdkDir = properties.getProperty('sdk.dir')
    } catch (Exception e) {
    }
    if (sdkDir == null || !new File(sdkDir).exists()) {
        if (sdkDir == null) {
            println "${taskTag()}:${project.name}:${methodName()} [$flavorName] checkAaptPath : sdk.dir is null, Check ANDROID_SDK_ROOT"
        } else {
            println "${taskTag()}:${project.name}:${methodName()} [$flavorName] checkAaptPath : sdk.dir is not exist, Check ANDROID_SDK_ROOT"
        }
        sdkDir = System.getenv("ANDROID_SDK_ROOT")
    }
    if (sdkDir == null || !new File(sdkDir).exists()) {
        if (sdkDir == null) {
            println "${taskTag()}:${project.name}:${methodName()} [$flavorName] checkAaptPath : ANDROID_SDK_ROOT is null, Check ANDROID_HOME"
        } else {
            println "${taskTag()}:${project.name}:${methodName()} [$flavorName] checkAaptPath : ANDROID_SDK_ROOT is not exist, Check ANDROID_HOME"
        }
        sdkDir = System.getenv("ANDROID_HOME")
    }
    println "${taskTag()}:${project.name}:${methodName()} [$flavorName] androidSdkDir : " + sdkDir
    if (sdkDir == null) {
        println "${taskTag()}:${project.name}:${methodName()} [$flavorName] androidSdkDir : null"
        return null
    }
    if (!new File(sdkDir).exists()) {
        println "${taskTag()}:${project.name}:${methodName()} [$flavorName] androidSdkDir : not exist"
        return null
    }
    def exe = ""
    if (isWindows()) {
        exe = ".exe"
    }
    def compileSdkVersion = android.compileSdkVersion
    if (compileSdkVersion != null) {
        compileSdkVersion = compileSdkVersion.replaceAll("android-", "");
    }
    def buildToolDir = sdkDir + File.separator + "build-tools"
    def buildToolVersionDir = android.buildToolsVersion
    if (buildToolVersionDir == null) {
        def buildToolDirs = new File(buildToolDir).list(new FilenameFilter() {
            @Override
            boolean accept(File dir, String name) {
                return name.startsWith(String.valueOf(compileSdkVersion))
            }
        })
        if (buildToolDirs != null && buildToolDirs.length > 0) {
            buildToolVersionDir = buildToolDirs[0]
        }
    }
    def aaptFile = buildToolDir + File.separator + buildToolVersionDir + File.separator + "aapt" + exe
    println "${taskTag()}:${project.name}:${methodName()} [$flavorName] finalAaptPath : " + aaptFile
    return aaptFile
}

